services:
  postgres:
    image: postgres:15-alpine
    container_name: amboras-postgres
    environment:
      POSTGRES_USER: aetos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: store_analytics
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetos -d store_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: amboras-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    container_name: amboras-backend
    ports:
      - "3001:3001"
    environment:
      BACKEND_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: aetos
      DB_PASSWORD: password
      DB_NAME: store_analytics
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_secret
      SEED_ON_BOOT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: amboras-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
